<form [formGroup]='jogInsertForm' (ngSubmit)="jogInsertForm.valid && insert()" autocomplete="off">
    <h2 class="text-center text-primary">Insert new jog entry</h2>
    <hr>

    <app-text-input [formControl]='jogInsertForm.controls["date"]' [label]='"Date"'></app-text-input>
    <app-text-input [formControl]='jogInsertForm.controls["distance"]'  [label]='"Distance"'></app-text-input>
    <app-text-input [formControl]='jogInsertForm.controls["time"]'  [label]='"Time"'></app-text-input>
    <app-text-input [formControl]='jogInsertForm.controls["latitude"]'  [label]='"Latitude"'></app-text-input>
    <app-text-input [formControl]='jogInsertForm.controls["longitude"]'  [label]='"Longitude"'></app-text-input>

    <div class="row" *ngIf="validationErrors.length > 0">
        <ul class="text-danger">
            <li *ngFor="let error of validationErrors">
                {{error}}
            </li>
        </ul>
    </div>

    <div class="form-group text-center">
        <button [disabled]='!jogInsertForm.valid' class="btn btn-success mr-2" type="submit">Submit</button>
        <button class="btn btn-default mr-2" (click)="cancel()" type="button">Cancel</button>
    </div>
</form>
